# Frontend nginx — serves React SPA and proxies /api to the backend container.
# In production, the outer (host) nginx handles SSL and forwards to this container.

server {
    listen 80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files /index.html =404;
    }

    # SPA fallback — all non-file routes serve index.html for React Router
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
