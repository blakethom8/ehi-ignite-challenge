# Host-level nginx config for ehi.healthcaredataai.com
# Install on Hetzner 2: /etc/nginx/sites-available/ehi.healthcaredataai.com
# Then: ln -s /etc/nginx/sites-available/ehi.healthcaredataai.com /etc/nginx/sites-enabled/
# Then: certbot --nginx -d ehi.healthcaredataai.com

server {
    listen 80;
    server_name ehi.healthcaredataai.com;

    # API — proxy to FastAPI container
    location /api/ {
        proxy_pass http://127.0.0.1:8090/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeout for LLM-backed assistant responses
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Frontend — proxy to React/nginx container
    location / {
        proxy_pass http://127.0.0.1:8091/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
