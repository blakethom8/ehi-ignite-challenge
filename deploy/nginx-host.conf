# Host-level nginx config for ehi.healthcaredataai.com
# Install: copy to /opt/personal-website/nginx/conf.d/ehi.healthcaredataai.conf
# All containers share the personal-website_default Docker network.

server {
    listen 80;
    server_name ehi.healthcaredataai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ehi.healthcaredataai.com;

    ssl_certificate /etc/letsencrypt/live/ehi.healthcaredataai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ehi.healthcaredataai.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API — proxy to FastAPI container (Docker network)
    location /api/ {
        proxy_pass http://deploy_api_1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Frontend — proxy to React/nginx container (Docker network)
    location / {
        proxy_pass http://deploy_app_1:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/ehi-access.log;
    error_log /var/log/nginx/ehi-error.log;
}
