services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    env_file: ../.env
    environment:
      - ENVIRONMENT=production
      - SOF_AUTO_MATERIALIZE=true
    volumes:
      - ../data:/app/data
    restart: unless-stopped
    networks:
      - personal-website_default

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.app
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - personal-website_default

networks:
  personal-website_default:
    external: true
